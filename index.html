<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>LNH</title>
  </head>
  <body>
    <!-- LOCAL LOGIN FIRST -->
    <div id="local_login" class="local_login_container">
      <h2>Local Login</h2>
      <input class="login_field" id="local_user" type="text" placeholder="Local username">
      <input class="login_field" id="local_pass" type="password" placeholder="Local password">
      <button class="login_field" id="local_login_btn">Unlock</button>
    </div>

    <!-- LN PAGE (hidden until local login succeeds) -->
    <div id="ln_page" style="display:none;">
      <img src="./languagenut.jpeg" width="30%">
      <div id="login" class="overlay">
        <input class="login_field" id="username_input" type="text" placeholder="username">
        <input class="login_field" id="password_input" type="text" placeholder="password">
        <button class="login_field" id="login_btn">Log In</button>
      </div>

      <div id="hw_panel" class="overlay">
        <h2>homeworks</h2>
        <input type="checkbox" id="selectall">
        <label for="selectall">select all</label>
        <div id="hw_container" class="overflow_container"></div>
        <button id="do_hw" style="margin: 2rem">DO THE HOMEWORK</button>
      </div>

      <div id="log_panel" style="right: 1em" class="overlay">
        <h2>Logs</h2>
        <div id="hw_bar" class="progress_bar"></div>
        <br>
        <div id="log_container" class="overflow_container"></div>
      </div>

      <dialog id="settings">
        [Esc] to exit
        <br>
        Select the time you want your homework to appear to be done in:
        <input type="range" min="-3" max="18" value="2" id="speed_slider" step="0.1">
        <br>
        Current speed: <span id="speed_display"></span>
      </dialog>

      <button id="settings_button" class="settings_button">Settings</button>
    </div>

    <!-- ADMIN PANEL (hidden until admin login) -->
    <div id="admin_panel" class="overlay" style="display:none;">
      <h2>Admin Panel</h2>
      <p>Welcome, admin. Here’s your user list:</p>
      <div id="user_list" class="overflow_container"></div>
      <button id="back_to_ln">Back to LN Page</button>
    </div>

    <script src="index.js"></script>
    <script>
      async function loadUsers() {
        const response = await fetch("user.users");
        const data = await response.json();
        return data.users;
      }

      async function setupLocalLogin() {
        const users = await loadUsers();
        const btn = document.getElementById("local_login_btn");

        btn.onclick = () => {
          const u = document.getElementById("local_user").value.trim();
          const p = document.getElementById("local_pass").value.trim();
          const match = users.find(x => x.username === u && x.password === p);

          if (!match) {
            alert("Incorrect local login");
            return;
          }

          document.getElementById("local_login").style.display = "none";

          if (match.admin === true) {
            // Show admin panel
            document.getElementById("admin_panel").style.display = "block";
            const list = document.getElementById("user_list");
            list.innerHTML = users
              .map(
                user =>
                  `<div class="user_entry">${user.username} — ${
                    user.admin ? "Admin" : "User"
                  }</div>`
              )
              .join("");
          } else {
            // Show LN page
            document.getElementById("ln_page").style.display = "block";
          }
        };
      }

      // Back button for admin panel
      window.addEventListener("DOMContentLoaded", () => {
        setupLocalLogin();
        document.getElementById("back_to_ln").onclick = () => {
          document.getElementById("admin_panel").style.display = "none";
          document.getElementById("ln_page").style.display = "block";
        };
      });
    </script>
  </body>
</html>
