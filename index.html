<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LNH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
// Block direct access unless logged in
if (localStorage.getItem("lnh_logged_in") !== "true") {
    window.location.href = "index.html";
}
</script>

<img src="./languagenut.jpeg" width="30%" style="display:block;margin:auto;margin-top:1rem;">

<div id="login" class="overlay">
    <input class="login_field" id="username_input" type="text" placeholder="username">
    <input class="login_field" id="password_input" type="password" placeholder="password">
    <button class="login_field" id="login_btn">Log In</button>
</div>

<div id="hw_panel" class="overlay">
    <h2>Homeworks</h2>
    <input type="checkbox" id="selectall">
    <label for="selectall">Select all</label>

    <div id="hw_container" class="overflow_container"></div>

    <button id="do_hw" style="margin: 2rem;">DO THE HOMEWORK</button>
</div>

<div id="log_panel" class="overlay" style="right:1em;">
    <h2>Logs</h2>
    <div id="hw_bar" class="progress_bar"></div>
    <br>
    <div id="log_container" class="overflow_container"></div>
</div>

<dialog id="settings">
    [Esc] to exit
    <br><br>
    Select the time you want your homework to appear to be done in:
    <input type="range" min="-3" max="18" value="2" id="speed_slider" step="0.1">
    <br><br>
    Current speed: <span id="speed_display"></span>
</dialog>

<button id="settings_button" class="settings_button">Settings</button>

<script src="index.js"></script>

</body>
</html>
