<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LNH Homework Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1 class="title">LNH Homework Portal</h1>
    <button id="settings_button" class="settings_button">Settings ⚙️</button>
  </header>

  <!-- LOCAL LOGIN FIRST -->
  <div id="local_login" class="overlay visible">
    <h2>Local Login</h2>
    <input class="login_field" id="local_user" type="text" placeholder="Local username">
    <input class="login_field" id="local_pass" type="password" placeholder="Local password">
    <button class="login_field" id="local_login_btn">Unlock</button>
  </div>

  <!-- LN LOGIN (hidden until local login succeeds) -->
  <div id="login" class="overlay">
    <h2>Languagenut Login</h2>
    <input class="login_field" id="username_input" type="text" placeholder="LN username">
    <input class="login_field" id="password_input" type="password" placeholder="LN password">
    <button class="login_field" id="login_btn">Log In</button>
  </div>

  <!-- HOMEWORK PANEL -->
  <div id="hw_panel" class="overlay">
    <h2>Assignments</h2>
    <input type="checkbox" id="selectall">
    <label for="selectall">Select all</label>
    <div id="hw_container" class="overflow_container"></div>
    <button id="do_hw" style="margin: 2rem">DO THE HOMEWORK</button>
  </div>

  <!-- LOG PANEL -->
  <div id="log_panel" class="overlay right">
    <h2>Logs</h2>
    <div id="hw_bar" class="progress_bar"></div>
    <br>
    <div id="log_container" class="overflow_container"></div>
  </div>

  <!-- SETTINGS -->
  <dialog id="settings">
    [Esc] to exit
    <br><br>
    Select the time you want your homework to appear to be done in:
    <input type="range" min="-3" max="18" value="2" id="speed_slider" step="0.1">
    <br><br>
    Current speed: <span id="speed_display"></span>
  </dialog>

  <!-- SCRIPTS -->
  <script src="login.js"></script>
  <script src="index.js"></script>
</body>
</html>
