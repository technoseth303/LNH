<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LNH Local Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOCAL LOGIN ONLY -->
  <div id="local_login" class="local_login_container">
    <h2>Local Login</h2>
    <input class="login_field" id="local_user" type="text" placeholder="Local username">
    <input class="login_field" id="local_pass" type="password" placeholder="Local password">
    <button class="login_field" id="local_login_btn">Unlock</button>
  </div>

  <script src="login.js"></script>
</body>
</html>
